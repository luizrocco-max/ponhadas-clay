# Tema visual "clay & brass" — Ponhada's Clay League CCTSP
# As cores acompanham a paleta usada no app (ponhadas_clay.py).

[theme]
primaryColor = "#C9A227"            # GOLD — destaques, botões, seleção
backgroundColor = "#F6F4EC"         # CREAM — fundo principal
secondaryBackgroundColor = "#FFFFFF"  # CARD — sidebar e cartões
textColor = "#20241C"               # INK_TX — texto
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
